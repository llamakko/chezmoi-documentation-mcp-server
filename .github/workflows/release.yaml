name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build Release Artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Verify tag commit is on the default branch history
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          TAG_SHA: ${{ github.sha }}
        run: |
          COMPARE_STATUS="$(gh api "repos/${REPOSITORY}/compare/${TAG_SHA}...${DEFAULT_BRANCH}" --jq '.status')"
          if [ "${COMPARE_STATUS}" != "ahead" ] && [ "${COMPARE_STATUS}" != "identical" ]; then
            echo "::error::Release tags must point to commits reachable from ${DEFAULT_BRANCH}."
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install build tooling
        run: python -m pip install build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Check distribution metadata
        run: python -m twine check dist/*

      - name: Upload release artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: python-package-dist
          path: dist/*
          if-no-files-found: error

  github-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-release
    permissions:
      contents: write
      attestations: write
      artifact-metadata: write
      id-token: write

    steps:
      - name: Verify protected release environment is configured
        env:
          RELEASE_ENV_READY: ${{ vars.RELEASE_ENV_READY }}
        run: |
          if [ "${RELEASE_ENV_READY}" != "true" ]; then
            echo "::error::Configure the 'github-release' environment and set RELEASE_ENV_READY=true before publishing releases."
            exit 1
          fi

      - name: Download release artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-package-dist
          path: dist

      - name: Attest build provenance
        if: ${{ github.event.repository.private == false }}
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: "dist/*"

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG_NAME" -R "$REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" dist/* --clobber -R "$REPOSITORY"
          else
            gh release create "$TAG_NAME" dist/* \
              -R "$REPOSITORY" \
              --generate-notes \
              --title "$TAG_NAME"
          fi
